name: IT-1 Host Preparation

on:
  workflow_dispatch:

jobs:
  it1:
    runs-on: ubuntu-latest
    steps:
      - name: IT-1.1 Create Swap File
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== IT-1.1 SWAP ==="
            if swapon --show | grep -q swapfile; then
              echo "Swap already exists, skipping"
            else
              fallocate -l 16G /swapfile
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
              echo "/swapfile none swap sw 0 0" >> /etc/fstab
            fi
            free -h

      - name: IT-1.2 Disk Cleanup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== IT-1.2 DISK CLEANUP ==="
            docker system prune -f || echo "Docker not installed yet, skipping"
            docker volume prune -f || echo "skipped"
            df -h /

      - name: IT-1.3 Install and Configure UFW
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== IT-1.3 UFW ==="
            apt install ufw -y
            ufw default deny incoming
            ufw default allow outgoing
            ufw allow 22369/tcp
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw --force enable
            ufw status

      - name: Run All Verification Tests
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=============================="
            echo "TEST 1: SWAP (expect 16G)"
            free -h | grep Swap
            echo "TEST 2: DISK (expect > 30GB free)"
            df -h /
            echo "TEST 3: UFW (expect active + 3 rules)"
            ufw status
            echo "TEST 4: SSH port 22369 listening"
            ss -tlnp | grep 22369
            echo "=============================="
            echo "IT-1 VERIFICATION COMPLETE"
