<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Content-Security-Policy" content="style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; manifest-src 'self'; img-src 'self' data:; font-src 'self' data:;"/>
<meta name="color-scheme" content="dark"/>
<title>NYOTA Studio</title>
<link rel="icon" href="{{CS_STATIC_BASE}}/src/browser/media/favicon-dark-support.svg"/>
<link href="{{CS_STATIC_BASE}}/src/browser/pages/global.css" rel="stylesheet"/>
<meta id="coder-options" data-settings="{{OPTIONS}}"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FFFDF8;
  --gold:#C9A84C;
  --black:#0C0C0C;
  --surface:#111111;
  --border:rgba(255,253,248,0.08);
  --muted:rgba(255,253,248,0.35);
}
html,body{height:100%;background:var(--black);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
.layout{display:grid;grid-template-columns:1fr 440px;min-height:100vh}
.photo-panel{position:relative;overflow:hidden;background:#1a1410}
.photo-panel img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 25%;display:block}
.photo-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(12,12,12,0.10) 0%,rgba(12,12,12,0.05) 50%,rgba(12,12,12,0.60) 100%)}
.photo-content{position:absolute;bottom:0;left:0;right:0;padding:48px 52px}
.tagline{font-size:12px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,253,248,0.50);line-height:2}
.form-panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:space-between;padding:52px 48px;position:relative}
.brand-block{text-align:center}
.logo-icon{display:block;width:32px;height:32px;margin:0 auto 28px auto}
.brand-label{font-size:10px;font-weight:600;letter-spacing:0.30em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.brand-name{font-size:38px;font-weight:900;letter-spacing:-0.03em;text-transform:uppercase;color:var(--cream);line-height:1}
.divider{display:block;width:100%;height:1px;background:var(--border);margin:40px 0}
.access-label{font-size:10px;font-weight:700;letter-spacing:0.20em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;display:flex;align-items:center;gap:12px}
.access-label::after{content:'';flex:1;height:1px;background:var(--border)}
.login-form{display:flex;flex-direction:column;gap:0}
.login-form>.user{display:none}
.login-form>.field{display:flex;flex-direction:column;gap:14px}
.login-form>.field>.password{width:100%;background:rgba(255,253,248,0.04)!important;border:1px solid var(--border)!important;border-radius:3px!important;color:var(--cream)!important;font-family:inherit!important;font-size:14px!important;font-weight:400!important;padding:14px 16px!important;outline:none!important;transition:border-color 0.18s,background 0.18s!important;-webkit-appearance:none!important}
.login-form>.field>.password::placeholder{color:rgba(255,253,248,0.20)!important;letter-spacing:0.04em!important}
.login-form>.field>.password:focus{border-color:var(--gold)!important;background:rgba(201,168,76,0.06)!important;box-shadow:0 0 0 3px rgba(201,168,76,0.12)!important}
.login-form>.field>.submit{width:100%!important;margin:0!important;background:var(--cream)!important;border:none!important;border-radius:3px!important;color:var(--black)!important;font-family:inherit!important;font-size:11px!important;font-weight:800!important;letter-spacing:0.22em!important;text-transform:uppercase!important;padding:15px 24px!important;cursor:pointer!important;transition:background 0.15s,transform 0.1s!important;-webkit-appearance:none!important}
.login-form>.field>.submit:hover{background:#F0EEE8!important}
.login-form>.field>.submit:active{transform:scale(0.985)!important}
.login-form>.error{color:#E07070!important;font-size:12px!important;margin-top:10px!important;letter-spacing:0.03em!important}
.role-tag{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-top:28px}
.role-tag::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:0.7}
.form-footer{display:flex;justify-content:space-between;align-items:center;padding-top:40px}
.footer-text{font-size:10px;font-weight:400;letter-spacing:0.10em;color:rgba(255,253,248,0.15)}
@media(max-width:820px){.layout{grid-template-columns:1fr}.photo-panel{height:240px;position:relative}.form-panel{border-left:none;border-top:1px solid var(--border)}}
</style>
</head>
